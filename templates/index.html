<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>QR de WhatsApp</title>
</head>
<body>
    <h1>Generador de QR para WhatsApp</h1>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form action="/generar-whatsapp" method="POST">
        <input type="text" name="numero" placeholder="Ejemplo: 5215512345678" required>
        <input type="text" name="mensaje" placeholder="Mensaje opcional">
        <button type="submit">Generar QR</button>
    </form>
</body>
</html>
