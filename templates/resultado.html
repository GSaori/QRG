<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Permite usar caracteres especiales correctamente -->
    <meta charset="UTF-8">

    <!-- Título de la pestaña del navegador -->
    <title>Resultado QR</title>

    <!--
        Carga el archivo de estilos desde la carpeta static/css.
        url_for ayuda a Flask a construir la ruta correcta automáticamente.
    -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>
    <div class="contenedor">
        <!-- Título principal -->
        <h1>QR generado correctamente</h1>

        <!--
            Mostramos el contenido convertido a QR.
            En tu caso normalmente será el enlace de WhatsApp.
        -->
        <p><strong>Contenido:</strong> {{ contenido }}</p>

        <!--
            Mostramos la imagen del QR.
            url_for('mostrar_qr', nombre_archivo=qr_generado)
            llama a la ruta Flask que entrega el archivo desde generated_qr.
        -->
        <img src="{{ url_for('mostrar_qr', nombre_archivo=qr_generado) }}" alt="QR generado">

        <br><br>

        <!--
            Enlace para descargar la imagen QR.
            El atributo download ayuda a que el navegador la baje como archivo.
        -->
        <a href="{{ url_for('mostrar_qr', nombre_archivo=qr_generado) }}" download>
            Descargar QR
        </a>

        <br><br>

        <!-- Enlace para volver a la página principal -->
        <a href="{{ url_for('inicio') }}">Generar otro QR</a>
    </div>
</body>
</html>
